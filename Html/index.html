<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<title>Chair or Die - Prêt à vous asseoir ?</title>
		<link
			rel="icon"
			type="image/x-icon"
			href="../Image/Favicon/favicon_io/favicon.ico"
		/>

		<link rel="stylesheet" href="../CSS/global.css?v=64" />
		<link rel="stylesheet" href="../CSS/navbar.css?v=64" />
		<link rel="stylesheet" href="../CSS/footer.css?v=64" />
		<link rel="stylesheet" href="../CSS/index.css?v=64" />

		<script src="../JavaScript/item.js?v=64"></script>
		<script src="../JavaScript/jeu.js?v=64"></script>
		<script src="../JavaScript/script.js?v=64" defer></script>
		<script src="../JavaScript/qrcode.min.js"></script>
	</head>
	<body>
		<header>
			<nav>
				<a href="index.html" class="logo-link">
					<img src="../Image/logo1-Photoroom.png" alt="logo" />
				</a>
				<div class="nav-links">
					<a href="index.html">Accueil</a><a href="Wiki.html">Wiki</a>
				</div>
			</nav>
		</header>

		<main>
			<section class="game-launcher">
				<div class="game-card">
					<div id="game-arena"></div>
					<canvas id="bg-canvas"></canvas>
					<div class="bg-animated"></div>

					<img
						src="../Image/logo1-Photoroom.png"
						alt="Logo Chair or Die"
						class="hero-logo"
						id="main-logo"
					/>

					<div class="action-zone" id="main-menu">
						<button class="btn-main btn-join" onclick="JoinGame()">
							🎮 Rejoindre la partie
						</button>
						<button
							class="btn-main btn-qr"
							onclick="toggleQRCode()"
						>
							📱 Afficher le QR Code
						</button>
						<button class="btn-host" onclick="OpenLobby()">
							▶️ Démarrer la manche (Écran Hôte)
						</button>
						<span class="slogan"
							>La chaise musicale devient un Battle Royale !</span
						>
					</div>

					<div id="lobby-screen">
						<h2 class="lobby-title">Salon d'attente</h2>

						<div class="room-code-container">
							<h1 class="room-code-title">
								CODE :
								<span id="display-room-code">----</span>
							</h1>
						</div>

						<div class="player-count-container">
							Joueurs prêts :
							<span id="player-count">0</span>
							/ 100
						</div>

						<div id="player-list" class="lobby-list"></div>
						<button
							class="btn-main btn-join btn-start-game"
							onclick="StartActualGame()"
						>
							🏁 Lancer le jeu
						</button>
					</div>
				</div>
			</section>
		</main>

		<div id="qr-modal" class="modal-container" onclick="toggleQRCode()">
			<div class="modal-content" onclick="event.stopPropagation()">
				<span class="close-modal" onclick="toggleQRCode()"
					>&times;</span
				>
				<h2>Scannez pour rejoindre</h2>
				<img
					src="../Image/qr-code.png"
					alt="QR Code Chair or Die"
					class="qr-image-big"
				/>
				<p>Ou tapez : <strong>192.168.0.50</strong></p>
			</div>
		</div>

		<div
			id="pseudo-modal"
			class="modal-container"
			onclick="closePseudoModal()"
		>
			<div class="modal-content" onclick="event.stopPropagation()">
				<span class="close-modal" onclick="closePseudoModal()"
					>&times;</span
				>
				<h2>🎮 Rejoindre la Room</h2>
				<input
					type="text"
					id="room-code-input"
					placeholder="CODE (4 lettres)"
					class="pseudo-input"
					maxlength="4"
				/>
				<br />
				<input
					type="text"
					id="pseudo-input"
					placeholder="Ton Pseudo..."
					class="pseudo-input"
				/>
				<br />
				<button
					class="btn-main btn-join btn-confirm-join"
					onclick="ConfirmJoin()"
				>
					Valider et Jouer
				</button>
			</div>
		</div>

		<button id="stop-game-btn" onclick="StopGame()">
			❌ Quitter le jeu
		</button>

		<div id="winner-overlay">
			<div class="winner-content">
				<h1 class="winner-title">GRAND GAGNANT</h1>
				<div id="winner-name">NOM DU JOUEUR</div>
				<div class="winner-trophy">🏆</div>
				<button class="btn-main btn-join" onclick="location.reload()">
					REJOUER
				</button>
			</div>
		</div>
	</body>
</html>
